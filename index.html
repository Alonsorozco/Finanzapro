<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanzaPro - Panel Profesional</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
        color: #212529;
      }
      .card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }
      .stat-card {
        transition: transform 0.2s;
      }
      .stat-card:hover {
        transform: translateY(-5px);
      }
      .icon-box {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
      }
      .table thead th {
        background-color: #f8f9fa;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        font-weight: 700;
        color: #6c757d;
        border-top: none;
      }
      @media print {
        .no-print { display: none !important; }
        body { background: white; }
        .card { box-shadow: none; border: 1px solid #dee2e6; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print mb-4">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-wallet text-primary"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
            FinanzaPro
          </a>
          <div class="ms-auto d-flex gap-2">
            <input type="month" id="filterMonth" class="form-control form-control-sm">
            <button class="btn btn-primary btn-sm" id="btnExportPDF">Exportar PDF</button>
            <button class="btn btn-outline-light btn-sm" onclick="window.print()">Imprimir</button>
          </div>
        </div>
      </nav>

      <div class="container pb-5">
        <!-- Stats Row -->
        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card stat-card p-4">
              <div class="d-flex align-items-center gap-3">
                <div class="icon-box bg-primary-subtle text-primary">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div>
                  <p class="text-muted small mb-0">Balance Neto</p>
                  <h3 class="fw-bold mb-0" id="statBalance">$0</h3>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card stat-card p-4">
              <div class="d-flex align-items-center gap-3">
                <div class="icon-box bg-success-subtle text-success">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                </div>
                <div>
                  <p class="text-muted small mb-0">Total Ingresos</p>
                  <h3 class="fw-bold mb-0 text-success" id="statIncome">+$0</h3>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card stat-card p-4">
              <div class="d-flex align-items-center gap-3">
                <div class="icon-box bg-danger-subtle text-danger">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                </div>
                <div>
                  <p class="text-muted small mb-0">Total Gastos</p>
                  <h3 class="fw-bold mb-0 text-danger" id="statExpense">-$0</h3>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <!-- Main Content -->
          <div class="col-lg-8">
            <!-- Chart Card -->
            <div class="card p-4 mb-4">
              <h5 class="fw-bold mb-4">Flujo de Caja Mensual</h5>
              <div style="height: 300px;">
                <canvas id="mainChart"></canvas>
              </div>
            </div>

            <!-- Table Card -->
            <div class="card overflow-hidden">
              <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">Transacciones Recientes</h5>
                <span class="badge bg-secondary rounded-pill" id="transactionCount">0 Movimientos</span>
              </div>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead>
                    <tr>
                      <th class="ps-4">Fecha</th>
                      <th>Descripción</th>
                      <th>Categoría</th>
                      <th class="text-end">Monto</th>
                      <th class="text-end pe-4 no-print"></th>
                    </tr>
                  </thead>
                  <tbody id="transactionTableBody">
                    <!-- Data injected by JS -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="col-lg-4 no-print">
            <!-- Form Card -->
            <div class="card p-4 mb-4">
              <h5 class="fw-bold mb-4">Nueva Transacción</h5>
              <form id="transactionForm">
                <div class="btn-group w-100 mb-3" role="group">
                  <input type="radio" class="btn-check" name="type" id="typeExpense" value="expense" checked>
                  <label class="btn btn-outline-danger" for="typeExpense">Gasto</label>
                  <input type="radio" class="btn-check" name="type" id="typeIncome" value="income">
                  <label class="btn btn-outline-success" for="typeIncome">Ingreso</label>
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted text-uppercase">Monto</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" id="amount" class="form-control" placeholder="0.00" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted text-uppercase">Descripción</label>
                  <input type="text" id="description" class="form-control" placeholder="Ej: Supermercado" required>
                </div>

                <div class="row g-2 mb-4">
                  <div class="col-6">
                    <label class="form-label small fw-bold text-muted text-uppercase">Categoría</label>
                    <select id="category" class="form-select">
                      <!-- Options injected by JS -->
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label small fw-bold text-muted text-uppercase">Fecha</label>
                    <input type="date" id="date" class="form-control" required>
                  </div>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Agregar Registro</button>
              </form>
            </div>

            <!-- Category Chart Card -->
            <div class="card p-4">
              <h5 class="fw-bold mb-4">Gastos por Categoría</h5>
              <div style="height: 200px;">
                <canvas id="categoryChart"></canvas>
              </div>
              <div id="categoryLegend" class="mt-4">
                <!-- Legend injected by JS -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
